<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EntraMap</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <link
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        rel="stylesheet"
    />
    <link href="/static/css/style.css" rel="stylesheet" />
</head>
<body>
<div id="app">

    <!-- ===== LEFT PANEL ===== -->
    <div id="left-panel">

        <div id="header">
            <i class="fas fa-project-diagram header-icon"></i>
            <span class="header-title">EntraMap</span>
            <div id="user-menu" class="ms-auto d-flex align-items-center gap-2">
                <span id="user-name" title="{{ user.upn }}">{{ user.name }}</span>
                <a href="/auth/signout" id="signout-btn" title="Uitloggen">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </div>

        <!-- Search section -->
        <div id="search-section">
            <div class="search-tabs">
                <button class="search-tab active" data-type="user">
                    <i class="fas fa-user"></i> Gebruiker
                </button>
                <button class="search-tab" data-type="group">
                    <i class="fas fa-users"></i> Groep
                </button>
            </div>
            <div class="search-input-wrap">
                <i class="fas fa-search search-prefix-icon"></i>
                <input
                    id="search-input"
                    type="text"
                    class="form-control search-field"
                    placeholder="Naam of UPN..."
                    autocomplete="off"
                    spellcheck="false"
                />
                <span id="search-spinner" class="search-spinner d-none">
                    <i class="fas fa-circle-notch fa-spin"></i>
                </span>
            </div>
        </div>

        <!-- Search results dropdown -->
        <div id="search-results-wrap">
            <div id="search-results"></div>
        </div>

        <!-- Divider shown only when detail is open -->
        <div id="detail-divider" class="d-none"></div>

        <!-- Detail panel -->
        <div id="detail-panel" class="d-none">
            <div id="detail-header">
                <div id="detail-badge-wrap"></div>
                <div id="detail-name"></div>
                <button id="detail-close" title="Sluiten">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="detail-body"></div>
        </div>

        <!-- Tip when nothing selected -->
        <div id="left-tip">
            <i class="fas fa-mouse-pointer"></i>
            Klik op een object om details te zien
        </div>

    </div>

    <!-- ===== RIGHT PANEL ===== -->
    <div id="right-panel">

        <!-- Toolbar -->
        <div id="graph-toolbar">
            <div class="legend">
                <span class="leg user"><span class="leg-dot"></span>Gebruiker</span>
                <span class="leg device"><span class="leg-dot"></span>Device</span>
                <span class="leg group"><span class="leg-dot"></span>Groep</span>
                <span class="leg app"><span class="leg-dot"></span>App</span>
                <span class="leg ca_policy"><span class="leg-dot"></span>CA Policy</span>
            </div>
            <div class="toolbar-actions">
                <button id="btn-fit" class="tb-btn" title="Alles tonen">
                    <i class="fas fa-expand-arrows-alt"></i>
                </button>
                <button id="btn-reset-layout" class="tb-btn" title="Layout herberekenen">
                    <i class="fas fa-redo"></i>
                </button>
            </div>
        </div>

        <!-- Cytoscape container -->
        <div id="graph"></div>

        <!-- Loading overlay -->
        <div id="graph-loading" class="d-none">
            <div class="loading-inner">
                <div class="spinner-ring"></div>
                <p>Entra data ophalen&hellip;</p>
            </div>
        </div>

        <!-- Empty state -->
        <div id="empty-state">
            <i class="fas fa-project-diagram empty-icon"></i>
            <h5>Zoek een gebruiker of groep</h5>
            <p>Gebruik het paneel links om te beginnen.</p>
        </div>

    </div><!-- /right-panel -->

</div><!-- /app -->

<!-- Config error toast -->
<div id="toast-container" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>
